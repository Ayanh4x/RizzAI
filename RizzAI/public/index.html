<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>RizzAI — Anime Assistant</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link href="https://fonts.googleapis.com/css2?family=Zen+Maru+Gothic:wght@400;500;700&family=Klee+One:wght@400;600&display=swap" rel="stylesheet"/>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --sakura:#f9c5d1;--deep:#1a0a2e;--mid:#3d2448;
  --accent:#e879a0;--accent2:#a855f7;
  --glass:rgba(255,240,250,0.78);--glassbrd:rgba(249,197,209,0.45);
  --text:#1a0a20;--textlight:#7c5490;
  --font:'Zen Maru Gothic',sans-serif;--fontc:'Klee One',cursive;
}
html,body{width:100%;height:100%;overflow:hidden;background:var(--deep);font-family:var(--font);color:var(--text)}
#bg{
  position:fixed;inset:0;z-index:0;
  background:
    radial-gradient(ellipse 130% 80% at 50% -10%,#7c3aed33,transparent 55%),
    radial-gradient(ellipse 70% 55% at 85% 110%,#f472b622,transparent 50%),
    radial-gradient(ellipse 55% 45% at 5% 85%,#a855f71a,transparent 50%),
    linear-gradient(160deg,#1a0a2e,#2d1040 45%,#180928);
}
#bg::after{
  content:'';position:absolute;inset:0;
  background-image:linear-gradient(rgba(168,85,247,.04) 1px,transparent 1px),linear-gradient(90deg,rgba(168,85,247,.04) 1px,transparent 1px);
  background-size:60px 60px;
}
.petal{position:fixed;pointer-events:none;z-index:1;border-radius:0 80% 0 80%;opacity:0;animation:petalfall linear infinite}
@keyframes petalfall{0%{transform:translateY(-20px) rotate(0deg);opacity:0}8%{opacity:.75}90%{opacity:.3}100%{transform:translateY(108vh) rotate(820deg);opacity:0}}
#app{position:relative;z-index:2;width:100%;height:100vh;display:grid;grid-template-columns:1fr 430px}
@media(max-width:760px){#app{grid-template-columns:1fr;grid-template-rows:52vh 1fr}}
#cv-wrap{position:relative;overflow:hidden;background:transparent}
#cv-wrap canvas{width:100%!important;height:100%!important;display:block}
#etag{position:absolute;top:18px;left:18px;background:var(--glass);backdrop-filter:blur(14px);border:1px solid var(--glassbrd);border-radius:30px;padding:6px 18px;font-size:12px;color:var(--accent);font-weight:700;letter-spacing:1px;text-transform:uppercase;opacity:0;transition:opacity .4s;pointer-events:none;user-select:none}
#etag.on{opacity:1}
#wavewrap{position:absolute;top:18px;right:18px;display:flex;align-items:center;gap:3px;opacity:0;transition:opacity .3s}
#wavewrap.on{opacity:1}
.wb{width:4px;border-radius:4px;background:var(--accent);animation:wbanim .7s ease-in-out infinite alternate}
.wb:nth-child(1){height:5px;animation-delay:0s}.wb:nth-child(2){height:14px;animation-delay:.1s}.wb:nth-child(3){height:22px;animation-delay:.2s}.wb:nth-child(4){height:14px;animation-delay:.13s}.wb:nth-child(5){height:5px;animation-delay:.06s}
@keyframes wbanim{to{height:3px}}
#badge{position:absolute;bottom:24px;left:50%;transform:translateX(-50%);background:var(--glass);backdrop-filter:blur(16px);border:1px solid var(--glassbrd);border-radius:40px;padding:8px 28px;display:flex;align-items:center;gap:10px;box-shadow:0 8px 40px rgba(168,85,247,.2);white-space:nowrap}
#badge .dot{width:9px;height:9px;border-radius:50%;background:var(--accent);animation:pdot 2s ease-in-out infinite}
@keyframes pdot{0%,100%{transform:scale(1);opacity:1}50%{transform:scale(1.5);opacity:.5}}
#badge span{font-size:13px;color:var(--mid);font-weight:700;letter-spacing:2px}
#animlabel{position:absolute;bottom:72px;left:50%;transform:translateX(-50%);background:rgba(168,85,247,.18);backdrop-filter:blur(8px);border:1px solid rgba(168,85,247,.28);border-radius:20px;padding:4px 16px;font-size:11px;color:#d8b4fe;letter-spacing:1px;opacity:0;transition:opacity .4s;white-space:nowrap;pointer-events:none}
#animlabel.on{opacity:1}
#chat{display:flex;flex-direction:column;background:var(--glass);backdrop-filter:blur(26px);border-left:1px solid var(--glassbrd);box-shadow:-6px 0 50px rgba(168,85,247,.12)}
#chat-head{padding:20px 22px 14px;background:linear-gradient(135deg,rgba(168,85,247,.13),rgba(232,121,160,.08));border-bottom:1px solid var(--glassbrd);display:flex;align-items:center;justify-content:space-between;flex-shrink:0}
#chat-head h1{font-size:19px;font-weight:700;background:linear-gradient(135deg,var(--accent2),var(--accent));-webkit-background-clip:text;-webkit-text-fill-color:transparent}
#chat-head p{font-size:11px;color:var(--textlight);margin-top:2px;font-family:var(--fontc)}
#btn-reset{background:none;border:1px solid var(--glassbrd);border-radius:8px;color:var(--textlight);font-size:11px;padding:5px 12px;cursor:pointer;transition:all .2s;font-family:var(--font);flex-shrink:0}
#btn-reset:hover{border-color:var(--accent);color:var(--accent)}
#msgs{flex:1;overflow-y:auto;padding:18px 14px;display:flex;flex-direction:column;gap:12px;scroll-behavior:smooth}
#msgs::-webkit-scrollbar{width:3px}
#msgs::-webkit-scrollbar-thumb{background:var(--glassbrd);border-radius:3px}
.msg{max-width:88%;display:flex;flex-direction:column;animation:mpop .35s cubic-bezier(.34,1.56,.64,1) both}
@keyframes mpop{from{opacity:0;transform:translateY(10px) scale(.95)}to{opacity:1;transform:none}}
.msg.user{align-self:flex-end;align-items:flex-end}
.msg.rizzai{align-self:flex-start;align-items:flex-start}
.bubble{padding:11px 15px;border-radius:18px;font-family:var(--fontc);font-size:14px;line-height:1.65;word-break:break-word}
.msg.user .bubble{background:linear-gradient(135deg,var(--accent2),var(--accent));color:#fff;border-bottom-right-radius:4px;box-shadow:0 4px 16px rgba(168,85,247,.38)}
.msg.rizzai .bubble{background:rgba(255,255,255,.92);color:var(--text);border-bottom-left-radius:4px;box-shadow:0 4px 14px rgba(0,0,0,.07)}
.meta{font-size:10px;color:var(--textlight);margin-top:3px;padding:0 4px}
#typing{display:none;align-self:flex-start;background:rgba(255,255,255,.92);border-radius:18px;border-bottom-left-radius:4px;padding:12px 16px;gap:5px;box-shadow:0 4px 14px rgba(0,0,0,.07)}
#typing.on{display:flex}
.td{width:7px;height:7px;border-radius:50%;background:var(--accent);animation:tda 1.1s ease-in-out infinite}
.td:nth-child(2){animation-delay:.2s}.td:nth-child(3){animation-delay:.4s}
@keyframes tda{0%,80%,100%{transform:scale(.55);opacity:.35}40%{transform:scale(1);opacity:1}}
#input-area{padding:14px;border-top:1px solid var(--glassbrd);display:flex;flex-direction:column;gap:9px;background:rgba(255,240,250,.45);flex-shrink:0}
#qrow{display:flex;gap:6px;flex-wrap:wrap}
.qbtn{background:rgba(255,255,255,.72);border:1px solid var(--glassbrd);border-radius:20px;padding:4px 12px;font-size:11px;color:var(--textlight);cursor:pointer;font-family:var(--fontc);transition:all .2s;white-space:nowrap}
.qbtn:hover{border-color:var(--accent);color:var(--accent)}
#irow{display:flex;gap:8px;align-items:flex-end}
#uinput{flex:1;background:rgba(255,255,255,.93);border:1.5px solid var(--glassbrd);border-radius:14px;padding:10px 13px;font-family:var(--fontc);font-size:14px;color:var(--text);outline:none;resize:none;max-height:100px;min-height:42px;line-height:1.5;transition:border-color .2s}
#uinput:focus{border-color:var(--accent2)}
#uinput::placeholder{color:#c4a0c8}
.ibtn{width:42px;height:42px;border-radius:12px;border:none;display:flex;align-items:center;justify-content:center;cursor:pointer;font-size:18px;flex-shrink:0;transition:transform .15s,opacity .2s}
.ibtn:active{transform:scale(.91)}
#btn-send{background:linear-gradient(135deg,var(--accent2),var(--accent));color:#fff;box-shadow:0 4px 16px rgba(168,85,247,.42)}
#btn-send:disabled{opacity:.35;cursor:not-allowed}
#btn-mic{background:rgba(255,255,255,.9);border:1.5px solid var(--glassbrd);color:var(--textlight)}
#btn-mic.rec{background:var(--accent);color:#fff;border-color:var(--accent);animation:micpulse .8s ease-in-out infinite alternate}
@keyframes micpulse{to{box-shadow:0 0 0 9px rgba(232,121,160,0)}}
#loading{position:fixed;inset:0;z-index:300;background:var(--deep);display:flex;flex-direction:column;align-items:center;justify-content:center;gap:18px;transition:opacity .7s}
#loading.hide{opacity:0;pointer-events:none}
.ring{width:60px;height:60px;border-radius:50%;border:3px solid transparent;border-top-color:var(--accent2);border-right-color:var(--accent);animation:spin 1s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
#loading p{color:var(--sakura);font-size:13px;letter-spacing:2px;font-family:var(--font)}
</style>
</head>
<body>
<div id="bg"></div>
<div id="loading"><div class="ring"></div><p id="lpct">Loading RizzAI…</p></div>
<div id="app">
  <div id="cv-wrap">
    <div id="etag">✨ ready</div>
    <div id="wavewrap"><div class="wb"></div><div class="wb"></div><div class="wb"></div><div class="wb"></div><div class="wb"></div></div>
    <div id="animlabel">idle</div>
    <div id="badge"><div class="dot"></div><span>RIZZAI</span></div>
  </div>
  <div id="chat">
    <div id="chat-head">
      <div><h1>💬 Chat with RizzAI</h1><p>Your anime AI companion ✨</p></div>
      <button id="btn-reset">New Chat</button>
    </div>
    <div id="msgs">
      <div class="msg rizzai">
        <div class="bubble">Yatta, you're finally here~! I'm RizzAI, your anime companion. Ask me anything or just chat! ✿</div>
        <div class="meta">RizzAI · just now</div>
      </div>
      <div id="typing"><div class="td"></div><div class="td"></div><div class="td"></div></div>
    </div>
    <div id="input-area">
      <div id="qrow">
        <button class="qbtn" data-msg="Hello RizzAI! How are you today?">👋 Greet</button>
        <button class="qbtn" data-msg="Tell me something fun and surprising!">🎲 Surprise me</button>
        <button class="qbtn" data-msg="Can you tell me a short cute anime story?">📖 Story</button>
        <button class="qbtn" data-msg="Make me smile please!">😊 Cheer up</button>
        <button class="qbtn" data-msg="What are you thinking about right now?">💭 Thoughts</button>
      </div>
      <div id="irow">
        <textarea id="uinput" rows="1" placeholder="Say something to RizzAI…"></textarea>
        <button class="ibtn" id="btn-mic" title="Voice input">🎤</button>
        <button class="ibtn" id="btn-send" title="Send">➤</button>
      </div>
    </div>
  </div>
</div>

<script type="importmap">
{"imports":{"three":"https://cdn.jsdelivr.net/npm/three@0.163.0/build/three.module.js","three/addons/":"https://cdn.jsdelivr.net/npm/three@0.163.0/examples/jsm/","@pixiv/three-vrm":"https://cdn.jsdelivr.net/npm/@pixiv/three-vrm@2.1.2/lib/three-vrm.module.js"}}
</script>

<script type="module">
import * as THREE from 'three';
import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';
import { VRMLoaderPlugin, VRMUtils } from '@pixiv/three-vrm';

/* ── PETALS ── */
for(let i=0;i<26;i++){
  const p=document.createElement('div');p.className='petal';
  const s=5+Math.random()*12,hue=338+Math.random()*28;
  p.style.cssText=`left:${Math.random()*100}%;width:${s}px;height:${s}px;background:hsl(${hue},80%,83%);animation-duration:${7+Math.random()*12}s;animation-delay:${Math.random()*16}s;transform:rotate(${Math.random()*360}deg)`;
  document.body.appendChild(p);
}

/* ── RENDERER ── */
const wrap=document.getElementById('cv-wrap');
const W=()=>wrap.clientWidth,H=()=>wrap.clientHeight;
const renderer=new THREE.WebGLRenderer({antialias:true,alpha:true});
renderer.setPixelRatio(window.devicePixelRatio);
renderer.setSize(W(),H());
renderer.outputColorSpace=THREE.SRGBColorSpace;
renderer.shadowMap.enabled=true;
wrap.insertBefore(renderer.domElement,wrap.firstChild);
const scene=new THREE.Scene();
const camera=new THREE.PerspectiveCamera(24,W()/H(),0.1,30);
camera.position.set(0,1.20,2.85);
camera.lookAt(0,1.05,0);
scene.add(new THREE.AmbientLight(0xffeeff,1.7));
const sun=new THREE.DirectionalLight(0xffd6f0,2.4);sun.position.set(1.5,3,2);scene.add(sun);
const fill=new THREE.DirectionalLight(0xc4b5fd,1.1);fill.position.set(-2,1.5,-1);scene.add(fill);
const rim=new THREE.DirectionalLight(0xfda4af,0.8);rim.position.set(0,4,-3);scene.add(rim);
const glow=new THREE.Mesh(new THREE.CircleGeometry(0.9,48),new THREE.MeshBasicMaterial({color:0xe879a0,transparent:true,opacity:0.09}));
glow.rotation.x=-Math.PI/2;glow.position.y=-0.005;scene.add(glow);
window.addEventListener('resize',()=>{camera.aspect=W()/H();camera.updateProjectionMatrix();renderer.setSize(W(),H())});

/* ── VRM ── */
let vrm=null;
const loader=new GLTFLoader();
loader.register(p=>new VRMLoaderPlugin(p));
const overlay=document.getElementById('loading'),lpctEl=document.getElementById('lpct');
loader.load('./avatar.vrm',
  gltf=>{vrm=gltf.userData.vrm;VRMUtils.removeUnnecessaryJoints(vrm.scene);VRMUtils.rotateVRM0(vrm);scene.add(vrm.scene);overlay.classList.add('hide');setTimeout(()=>overlay.remove(),700);startLoop();},
  prog=>{lpctEl.textContent=`Loading RizzAI… ${Math.round((prog.loaded/(prog.total||1))*100)}%`;},
  err=>{console.warn('VRM:',err);lpctEl.textContent='Avatar unavailable — chat still works!';overlay.classList.add('hide');setTimeout(()=>overlay.remove(),1600);startLoop();}
);

/* ── MATH ── */
const lerp=(a,b,t)=>a+(b-a)*t;
const clamp=(v,a,b)=>Math.max(a,Math.min(b,v));
const sin=Math.sin,abs=Math.abs,PI=Math.PI;
function B(n){return vrm?.humanoid?.getNormalizedBoneNode(n)??null}
function setE(n,v){if(!vrm)return;try{vrm.expressionManager?.setValue(n,clamp(v,0,1));}catch(_){}}

/* ── POSE SYSTEM ── */
const TARGET={},LIVE={};
function setPose(map){for(const[k,v]of Object.entries(map)){if(!TARGET[k])TARGET[k]=[0,0,0];TARGET[k][0]=v[0];TARGET[k][1]=v[1];TARGET[k][2]=v[2];}}
function tickPose(dt){const sp=dt*11;for(const[n,t]of Object.entries(TARGET)){if(!LIVE[n])LIVE[n]=[0,0,0];LIVE[n][0]=lerp(LIVE[n][0],t[0],sp);LIVE[n][1]=lerp(LIVE[n][1],t[1],sp);LIVE[n][2]=lerp(LIVE[n][2],t[2],sp);}for(const[n,r]of Object.entries(LIVE)){const b=B(n);if(!b)continue;b.rotation.x=r[0];b.rotation.y=r[1];b.rotation.z=r[2];}}

/* ── FINGER SHAPES ── */
function fingers(side,shape){
  const s=side==='L'?'left':'right',sgn=side==='L'?1:-1,p={};
  const curl=(f,joints,rx,rz0=0)=>joints.forEach((j,i)=>{p[`${s}${f}${j}`]=[rx[i]??0,0,i===0?rz0:0];});
  if(shape==='open'){
    p[`${s}ThumbMetacarpal`]=[0,0,sgn*-0.32];p[`${s}ThumbProximal`]=[0,0,sgn*-0.12];p[`${s}ThumbDistal`]=[0.06,0,0];
    ['Index','Middle','Ring','Little'].forEach(f=>{curl(f,['Proximal','Intermediate','Distal'],[0.06,0.08,0.06],{Index:sgn*-0.06,Middle:sgn*-0.02,Ring:sgn*0.02,Little:sgn*0.06}[f]);});
  }else if(shape==='loose'){
    p[`${s}ThumbMetacarpal`]=[0,0,sgn*-0.26];p[`${s}ThumbProximal`]=[0,0,sgn*-0.09];p[`${s}ThumbDistal`]=[0.06,0,0];
    ['Index','Middle','Ring','Little'].forEach(f=>curl(f,['Proximal','Intermediate','Distal'],[0.16,0.20,0.12]));
  }else if(shape==='fist'){
    p[`${s}ThumbMetacarpal`]=[0.20,0,sgn*0.28];p[`${s}ThumbProximal`]=[0.30,0,sgn*0.18];p[`${s}ThumbDistal`]=[0.20,0,0];
    ['Index','Middle','Ring','Little'].forEach(f=>curl(f,['Proximal','Intermediate','Distal'],[1.40,1.40,1.40]));
  }else if(shape==='point'){
    p[`${s}ThumbMetacarpal`]=[0.20,0,sgn*0.28];p[`${s}ThumbProximal`]=[0.28,0,sgn*0.18];p[`${s}ThumbDistal`]=[0.18,0,0];
    ['Index','Middle','Ring','Little'].forEach(f=>{const c=f==='Index'?[0.04,0.04,0.04]:[1.40,1.40,1.40];curl(f,['Proximal','Intermediate','Distal'],c);});
  }else if(shape==='peace'){
    p[`${s}ThumbMetacarpal`]=[0.20,0,sgn*0.28];p[`${s}ThumbProximal`]=[0.28,0,sgn*0.18];p[`${s}ThumbDistal`]=[0.18,0,0];
    ['Index','Middle','Ring','Little'].forEach(f=>{const c=(f==='Index'||f==='Middle')?[0.04,0.04,0.04]:[1.40,1.40,1.40];curl(f,['Proximal','Intermediate','Distal'],c);});
  }else if(shape==='wave'){
    p[`${s}ThumbMetacarpal`]=[0,0,sgn*-0.36];p[`${s}ThumbProximal`]=[0,0,sgn*-0.13];p[`${s}ThumbDistal`]=[0.04,0,0];
    ['Index','Middle','Ring','Little'].forEach(f=>{curl(f,['Proximal','Intermediate','Distal'],[0.10,0.13,0.08],{Index:sgn*-0.09,Middle:sgn*-0.03,Ring:sgn*0.03,Little:sgn*0.09}[f]);});
  }else if(shape==='thinking'){
    p[`${s}ThumbMetacarpal`]=[0,0,sgn*-0.22];p[`${s}ThumbProximal`]=[0.10,0,sgn*-0.08];p[`${s}ThumbDistal`]=[0.08,0,0];
    ['Index','Middle','Ring','Little'].forEach(f=>{const c=f==='Index'?[0.28,0.28,0.18]:[0.80,0.80,0.80];curl(f,['Proximal','Intermediate','Distal'],c);});
  }
  return p;
}

/* ── IDLE POSES ── */
function idle_naturalStand(t){const b=sin(t*1.45)*0.014;return{hips:[0,0,0],spine:[0.022+b,0,0],chest:[0.012+b*0.6,0,0],upperChest:[b*0.4,0,0],neck:[0.020,0,0],head:[sin(t*.55)*.013,sin(t*.40)*.018,sin(t*.70)*.009],leftShoulder:[0,0,0.065+b*0.4],rightShoulder:[0,0,-0.065-b*0.4],leftUpperArm:[0.04,0.05,1.02+b*0.25],rightUpperArm:[0.04,-0.05,-1.02-b*0.25],leftLowerArm:[0,0,0.18+sin(t*1.0)*.008],rightLowerArm:[0,0,-0.18-sin(t*1.0)*.008],leftHand:[sin(t*1.1)*.012,0,-0.08],rightHand:[sin(t*1.1)*.012,0,0.08],...fingers('L','loose'),...fingers('R','loose')};}
function idle_gentleSway(t){const sw=sin(t*.88)*.024;return{hips:[0,sw*.35,0],spine:[0.022,-sw*.28,sw*.48],chest:[0.012,-sw*.16,sw*.28],neck:[0.020,0,0],head:[sin(t*.6)*.015,sin(t*.88)*.030,-sw*.18],leftShoulder:[0,0,0.065+sw*.08],rightShoulder:[0,0,-0.065-sw*.08],leftUpperArm:[0.04,0.05,1.02+sw*.10],rightUpperArm:[0.04,-0.05,-1.02+sw*.10],leftLowerArm:[0,0,0.18],rightLowerArm:[0,0,-0.18],leftHand:[sin(t*.88)*.020,0,-0.08],rightHand:[sin(t*.88)*.020,0,0.08],...fingers('L','loose'),...fingers('R','loose')};}
function idle_lookAround(t){const h=sin(t*.58)*.22;return{spine:[0.022,sin(t*.58)*.038,0],chest:[0.012,sin(t*.58)*.020,0],neck:[0.020,h*.32,0],head:[sin(t*.42)*.035,h,sin(t*.50)*.014],leftUpperArm:[0.04,0.05,1.02],rightUpperArm:[0.04,-0.05,-1.02],leftLowerArm:[0,0,0.18],rightLowerArm:[0,0,-0.18],leftHand:[0,0,-0.08],rightHand:[0,0,0.08],...fingers('L','loose'),...fingers('R','loose')};}
function idle_handSway(t){const ls=sin(t*1.10)*.055,rs=sin(t*1.10+0.5)*.055;return{spine:[0.022,sin(t*.70)*.010,0],neck:[0.020,sin(t*.55)*.015,0],head:[sin(t*.60)*.018,sin(t*.55)*.022,sin(t*.80)*.010],leftUpperArm:[0.04+sin(t*1.10)*.040,0.05,1.02+ls],rightUpperArm:[0.04+sin(t*1.10+0.5)*.040,-0.05,-1.02-rs],leftLowerArm:[0,0,0.20+sin(t*1.10)*.050],rightLowerArm:[0,0,-0.20-sin(t*1.10+0.5)*.050],leftHand:[sin(t*1.30)*.038,0,-0.08],rightHand:[sin(t*1.30+0.4)*.038,0,0.08],...fingers('L','wave'),...fingers('R','wave')};}
function idle_hipSway(t){const sw=sin(t*1.05)*.030;return{hips:[0,sw*.60,0],spine:[0.022,-sw*.40,sw*.60],chest:[0.012,-sw*.22,sw*.34],neck:[0.020,0,0],head:[sin(t*.7)*.014,sw*(-0.28),0],leftUpperArm:[0.04,0.05,1.02+sw*.12],rightUpperArm:[0.04,-0.05,-1.02+sw*.12],leftLowerArm:[0,0,0.18],rightLowerArm:[0,0,-0.18],leftHand:[0,0,-0.08],rightHand:[0,0,0.08],...fingers('L','loose'),...fingers('R','loose')};}

function gest_speak1(t){const sw=sin(t*PI*2)*.11*sin(t*PI);return{spine:[0.022,sin(t*PI)*.038,0],head:[0.022,sin(t*PI)*.076,0],leftUpperArm:[0.04+sin(t*PI)*.200,0.05+sin(t*PI)*.150,1.02-sin(t*PI)*.560],leftLowerArm:[sin(t*PI)*.250,0,0.18],leftHand:[sw,0,-0.08],rightUpperArm:[0.04,-0.05,-1.02],rightLowerArm:[0,0,-0.18],rightHand:[0,0,0.08],...fingers('L','open'),...fingers('R','loose')};}

function gest_speak3(t){const ch=sin(t*PI*3.2)*sin(t*PI);return{head:[0.022,ch*.048,0],rightUpperArm:[-0.05+ch*.05,-0.05,-0.75+ch*.20],rightLowerArm:[0.44+ch*.10,0,-0.05],rightHand:[0,ch*.140,0.08],leftUpperArm:[0.04,0.05,1.02],leftLowerArm:[0,0,0.18],leftHand:[0,0,-0.08],...fingers('R','open'),...fingers('L','loose')};}

const GESTURES=[
  {id:0,name:'Wave Hello',dur:3.2,fn:gest_wave},{id:1,name:'Thinking...',dur:3.6,fn:gest_thinking},
  {id:2,name:'Excited!',dur:2.0,fn:gest_excited},{id:3,name:'Shy~',dur:2.8,fn:gest_shy},
  {id:4,name:'Nodding',dur:1.8,fn:gest_nod},{id:5,name:'Shaking Head',dur:2.0,fn:gest_headShake},
  {id:6,name:'Surprised!',dur:2.2,fn:gest_surprised},{id:7,name:'Pointing',dur:2.5,fn:gest_point},
  {id:8,name:'Peace Sign ✌',dur:2.6,fn:gest_peace},{id:9,name:'Bowing',dur:2.8,fn:gest_bow},
  {id:10,name:'Big Stretch',dur:3.0,fn:gest_stretch},{id:11,name:'Clapping!',dur:2.4,fn:gest_clap},
  {id:12,name:'Sad...',dur:3.0,fn:gest_sad},{id:13,name:'Finger Wag',dur:2.4,fn:gest_fingerWag},
  {id:14,name:'Looking Up',dur:2.6,fn:gest_lookUp},{id:15,name:'Shrugging',dur:2.2,fn:gest_shrug},
  {id:16,name:'Head Tilt ♪',dur:2.2,fn:gest_tiltR},{id:17,name:'Head Tilt ♫',dur:2.2,fn:gest_tiltL},
  {id:18,name:'Giggling~',dur:2.0,fn:gest_giggle},
  {id:19,name:'Explaining',dur:3.0,fn:gest_speak1},{id:20,name:'Talking Hands',dur:2.5,fn:gest_speak2},
  {id:21,name:'Emphasizing',dur:2.0,fn:gest_speak3},{id:22,name:'Gesturing',dur:2.6,fn:gest_speak4},
];

const EMOTION_GESTURES={happy:[2,11,18,8,16],excited:[2,11,0,10,8],surprised:[6,15,14,17],thinking:[1,4,16,14],shy:[3,17,4,15],sad:[12,3,5,17],greeting:[0,9,8,2],listening:[1,4,16,19]};
const EXPR_MAP={happy:{happy:0.90},excited:{happy:1.00,surprised:0.32},surprised:{surprised:1.00},thinking:{relaxed:0.65},shy:{happy:0.55,surprised:0.22},sad:{sad:0.90},greeting:{happy:0.82},listening:{relaxed:0.38}};
const ALL_EXPRS=['happy','surprised','sad','angry','relaxed'];
let exprT={},exprC={};

function applyEmotion(emotion){
  exprT={...(EXPR_MAP[emotion]??{})};
  const labels={happy:'😊 Happy',excited:'⭐ Excited',surprised:'😲 Surprised',thinking:'🤔 Thinking',shy:'🌸 Shy',sad:'😢 Sad',greeting:'👋 Hello!',listening:'👂 Listening'};
  const el=document.getElementById('etag');el.textContent=labels[emotion]??'✨ Ready';el.classList.add('on');setTimeout(()=>el.classList.remove('on'),3400);
}

let idlePose=IDLES[0],idleTimer=0,idleSwapIn=7;
let gesture=null,gestureTimer=0;
let speaking=false,speakGestTimer=0;
let blinkTimer=2+Math.random()*3,blinkPhase=0,blinking=false;
let mouthV=0;

function playGesture(id){const g=GESTURES.find(x=>x.id===id);if(!g)return;gesture=g;gestureTimer=0;showLabel(g.name);}
function triggerEmotionGesture(emotion){const list=EMOTION_GESTURES[emotion]??[16,17,4];playGesture(list[Math.floor(Math.random()*list.length)]);}
let labelTO;
function showLabel(name){const el=document.getElementById('animlabel');el.textContent=name;el.classList.add('on');clearTimeout(labelTO);labelTO=setTimeout(()=>el.classList.remove('on'),2200);}

const clock=new THREE.Clock();
function startLoop(){
  const tick=()=>{
    requestAnimationFrame(tick);
    const dt=Math.min(clock.getDelta(),0.05),now=clock.elapsedTime;
    if(!vrm){renderer.render(scene,camera);return;}
    idleTimer+=dt;idleSwapIn-=dt;
    if(idleSwapIn<=0&&!gesture){idlePose=IDLES[Math.floor(Math.random()*IDLES.length)];idleTimer=0;idleSwapIn=6+Math.random()*9;showLabel(idlePose.name);}
    setPose(idlePose.fn(now));
    if(!gesture&&!speaking&&Math.random()<dt*0.045){const pool=[4,5,14,15,16,17,18,1,8];playGesture(pool[Math.floor(Math.random()*pool.length)]);}
    if(gesture){gestureTimer+=dt;const t=clamp(gestureTimer/gesture.dur,0,1);setPose(gesture.fn(t));if(t>=1)gesture=null;}
    if(speaking){speakGestTimer-=dt;if(speakGestTimer<=0){const pool=[19,20,21,22,4,16,7];playGesture(pool[Math.floor(Math.random()*pool.length)]);speakGestTimer=1.6+Math.random()*2.4;}}
    tickPose(dt);
    const mouthTgt=speaking?clamp(0.32+sin(now*12)*.28+sin(now*21)*.12,0,1):0;
    mouthV=lerp(mouthV,mouthTgt,dt*18);setE('aa',mouthV);setE('oh',mouthV*.34);setE('ih',mouthV*.18);
    blinkTimer-=dt;if(blinkTimer<=0&&!blinking){blinking=true;blinkPhase=0;}
    if(blinking){blinkPhase+=dt*9.5;const bv=blinkPhase<PI?sin(blinkPhase):0;setE('blink',bv);setE('blinkLeft',bv);setE('blinkRight',bv);if(blinkPhase>=PI){blinking=false;blinkTimer=2.5+Math.random()*3.8;}}
    ALL_EXPRS.forEach(k=>{exprC[k]=lerp(exprC[k]??0,exprT[k]??0,dt*3.8);setE(k,exprC[k]);});
    const ex=sin(now*.68)*.014,ey=sin(now*.47)*.009;
    const le=B('leftEye'),re=B('rightEye');
    if(le){le.rotation.x=ex;le.rotation.y=ey;}if(re){re.rotation.x=ex;re.rotation.y=ey;}
    vrm.update(dt);renderer.render(scene,camera);
  };tick();
}

/* ── TTS ── */
function cleanTTS(text){return text.replace(/[\u{1F000}-\u{1FFFF}]/gu,'').replace(/[\u2600-\u27FF]/g,'').replace(/[*_~`#]/g,'').replace(/[^\w\s',.!?;:-]/g,' ').replace(/\s+/g,' ').trim();}
function speak(text,emotion){
  if(!('speechSynthesis' in window))return;
  window.speechSynthesis.cancel();
  const clean=cleanTTS(text);if(!clean)return;
  const utt=new SpeechSynthesisUtterance(clean);
  utt.rate=1.04;utt.pitch=1.22;utt.volume=0.96;
  const vs=window.speechSynthesis.getVoices();
  const fv=vs.find(v=>/female|zira|susan|samantha|karen|moira|victoria|fiona/i.test(v.name))||vs.find(v=>v.lang.startsWith('en-'))||vs[0];
  if(fv)utt.voice=fv;
  utt.onstart=()=>{speaking=true;speakGestTimer=0;document.getElementById('wavewrap').classList.add('on');if(emotion)applyEmotion(emotion);};
  utt.onend=utt.onerror=()=>{speaking=false;document.getElementById('wavewrap').classList.remove('on');applyEmotion('listening');};
  window.speechSynthesis.speak(utt);
}

/* ── CHAT ── */
// Client-side history (Cloudflare Functions are stateless)
let chatHistory = [];

const msgsEl=document.getElementById('msgs');
const typingEl=document.getElementById('typing');
const inputEl=document.getElementById('uinput');
const sendBtn=document.getElementById('btn-send');
const micBtn=document.getElementById('btn-mic');

function addMsg(role,text){
  const d=document.createElement('div');d.className=`msg ${role}`;
  const now=new Date().toLocaleTimeString([],{hour:'2-digit',minute:'2-digit'});
  d.innerHTML=`<div class="bubble">${text.replace(/</g,'&lt;').replace(/\n/g,'<br>')}</div><div class="meta">${role==='rizzai'?'RizzAI':'You'} · ${now}</div>`;
  msgsEl.insertBefore(d,typingEl);msgsEl.scrollTop=msgsEl.scrollHeight;
}
function setTyping(on){typingEl.classList.toggle('on',on);sendBtn.disabled=on;msgsEl.scrollTop=msgsEl.scrollHeight;}

async function sendMessage(text){
  text=text.trim();if(!text)return;
  inputEl.value='';inputEl.style.height='';
  addMsg('user',text);setTyping(true);
  applyEmotion('listening');triggerEmotionGesture('listening');

  // Add user message to local history
  chatHistory.push({role:'user',content:text});

  try{
    const res=await fetch('/api/chat',{
      method:'POST',
      headers:{'Content-Type':'application/json'},
      // Send full history so the serverless function has context
      body:JSON.stringify({message:text, history:chatHistory.slice(-40)}),
    });
    const data=await res.json();
    setTyping(false);
    if(data.reply){
      // Add assistant reply to local history
      chatHistory.push({role:'assistant',content:data.reply});
      addMsg('rizzai',data.reply);
      triggerEmotionGesture(data.emotion??'happy');
      speak(data.reply,data.emotion??'happy');
    }else{
      addMsg('rizzai','Ehh… something went wrong! Sorry~');
    }
  }catch(e){
    setTyping(false);
    addMsg('rizzai','A-ano… I can\'t reach the server right now. Check the console?');
    console.error(e);
  }
}

sendBtn.addEventListener('click',()=>sendMessage(inputEl.value));
inputEl.addEventListener('keydown',e=>{if(e.key==='Enter'&&!e.shiftKey){e.preventDefault();sendMessage(inputEl.value);}});
inputEl.addEventListener('input',()=>{inputEl.style.height='';inputEl.style.height=Math.min(inputEl.scrollHeight,100)+'px';});
document.getElementById('btn-reset').addEventListener('click',()=>{
  chatHistory=[];
  while(msgsEl.firstChild!==typingEl)msgsEl.removeChild(msgsEl.firstChild);
  addMsg('rizzai','Hai~ fresh start! What shall we talk about? ✿');
  applyEmotion('greeting');triggerEmotionGesture('greeting');
});
document.querySelectorAll('.qbtn').forEach(b=>b.addEventListener('click',()=>sendMessage(b.dataset.msg)));

/* ── VOICE ── */
let recognition=null;
if('SpeechRecognition' in window||'webkitSpeechRecognition' in window){
  const SR=window.SpeechRecognition||window.webkitSpeechRecognition;
  recognition=new SR();recognition.lang='en-US';recognition.interimResults=false;
  recognition.onresult=e=>{const t=e.results[0][0].transcript;inputEl.value=t;sendMessage(t);};
  recognition.onend=recognition.onerror=()=>micBtn.classList.remove('rec');
}
micBtn.addEventListener('click',()=>{
  if(!recognition){addMsg('rizzai','Speech recognition isn\'t supported here~');return;}
  micBtn.classList.contains('rec')?recognition.stop():(micBtn.classList.add('rec'),recognition.start());
});
window.speechSynthesis?.getVoices();
window.addEventListener('voiceschanged',()=>window.speechSynthesis?.getVoices());
