<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0"/>
<title>RizzAI ✨</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;500;600;700;800&family=Quicksand:wght@400;500;600;700&display=swap" rel="stylesheet"/>
<style>
/* ════════════════════════════════════════════════════
   RESET + VARIABLES
════════════════════════════════════════════════════ */
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg0:#0d0618;
  --bg1:#130a22;
  --bg2:#1c1030;
  --p1:#e879a0;   /* rose */
  --p2:#a855f7;   /* violet */
  --p3:#f0abfc;   /* soft orchid */
  --p4:#fda4af;   /* petal pink */
  --glass:rgba(255,240,255,0.07);
  --glassbrd:rgba(240,171,252,0.18);
  --glasshov:rgba(255,240,255,0.12);
  --txt:#f5e6ff;
  --txt2:#c4a8dd;
  --txt3:#8b6aaa;
  --radius:20px;
  --font:'Nunito',sans-serif;
  --fontb:'Quicksand',sans-serif;
  --shadow:0 8px 32px rgba(168,85,247,0.25);
}
html,body{
  width:100%;height:100%;overflow:hidden;
  background:var(--bg0);
  font-family:var(--font);
  color:var(--txt);
  -webkit-tap-highlight-color:transparent;
}

/* ════════════════════════════════════════════════════
   ANIMATED BACKGROUND
════════════════════════════════════════════════════ */
#bg{position:fixed;inset:0;z-index:0;overflow:hidden}
#bg::before{
  content:'';position:absolute;inset:0;
  background:
    radial-gradient(ellipse 80% 60% at 20% 20%,#7c3aed18,transparent 60%),
    radial-gradient(ellipse 60% 50% at 80% 80%,#e879a018,transparent 55%),
    radial-gradient(ellipse 50% 40% at 50% 50%,#a855f710,transparent 50%),
    linear-gradient(135deg,#0d0618,#130a22 40%,#0d0618);
  animation:bgshift 12s ease-in-out infinite alternate;
}
@keyframes bgshift{
  0%{filter:hue-rotate(0deg)}
  100%{filter:hue-rotate(15deg)}
}
#bg::after{
  content:'';position:absolute;inset:0;
  background-image:
    radial-gradient(circle 1px at 50% 50%,rgba(240,171,252,0.15) 0%,transparent 100%);
  background-size:40px 40px;
  animation:starmove 20s linear infinite;
}
@keyframes starmove{0%{transform:translateY(0)}100%{transform:translateY(-40px)}}

/* petals */
.petal{
  position:fixed;pointer-events:none;z-index:1;
  border-radius:60% 40% 60% 40%;
  animation:petalfall linear infinite;
  opacity:0;
}
@keyframes petalfall{
  0%  {transform:translateY(-10px) translateX(0) rotate(0deg);opacity:0}
  5%  {opacity:.8}
  95% {opacity:.3}
  100%{transform:translateY(105vh) translateX(60px) rotate(600deg);opacity:0}
}

/* ════════════════════════════════════════════════════
   LAYOUT — desktop: side by side, mobile: stacked
════════════════════════════════════════════════════ */
#app{
  position:relative;z-index:2;
  width:100%;height:100vh;
  display:flex;flex-direction:row;
}

/* ════════════════════════════════════════════════════
   AVATAR PANEL
════════════════════════════════════════════════════ */
#avatar-panel{
  flex:1;position:relative;overflow:hidden;
  min-width:0;
}
#avatar-panel canvas{
  width:100%!important;height:100%!important;display:block;
}

/* top left — emotion */
#etag{
  position:absolute;top:16px;left:16px;
  background:var(--glass);backdrop-filter:blur(16px);
  border:1px solid var(--glassbrd);border-radius:40px;
  padding:6px 16px;font-size:11px;font-weight:700;
  color:var(--p3);letter-spacing:1.5px;text-transform:uppercase;
  opacity:0;transition:opacity .4s;pointer-events:none;
  font-family:var(--fontb);
}
#etag.on{opacity:1}

/* top right — speaking bars */
#wave{
  position:absolute;top:16px;right:16px;
  display:flex;align-items:center;gap:3px;
  opacity:0;transition:opacity .3s;
}
#wave.on{opacity:1}
.wb{
  width:3px;border-radius:3px;
  background:linear-gradient(180deg,var(--p2),var(--p1));
  animation:wb .65s ease-in-out infinite alternate;
}
.wb:nth-child(1){height:5px;animation-delay:0s}
.wb:nth-child(2){height:13px;animation-delay:.09s}
.wb:nth-child(3){height:20px;animation-delay:.18s}
.wb:nth-child(4){height:14px;animation-delay:.12s}
.wb:nth-child(5){height:6px;animation-delay:.05s}
@keyframes wb{to{height:3px}}

/* bottom — name badge */
#badge{
  position:absolute;bottom:20px;left:50%;transform:translateX(-50%);
  background:var(--glass);backdrop-filter:blur(20px);
  border:1px solid var(--glassbrd);border-radius:40px;
  padding:8px 24px;display:flex;align-items:center;gap:10px;
  box-shadow:var(--shadow);white-space:nowrap;
}
#badge .dot{
  width:8px;height:8px;border-radius:50%;
  background:var(--p1);
  box-shadow:0 0 8px var(--p1);
  animation:dotpulse 2s ease-in-out infinite;
}
@keyframes dotpulse{0%,100%{transform:scale(1);opacity:1}50%{transform:scale(1.6);opacity:.5}}
#badge span{font-size:12px;font-weight:800;letter-spacing:3px;color:var(--txt);font-family:var(--fontb)}

/* anim label */
#alabel{
  position:absolute;bottom:64px;left:50%;transform:translateX(-50%);
  background:rgba(168,85,247,.15);backdrop-filter:blur(8px);
  border:1px solid rgba(168,85,247,.22);border-radius:20px;
  padding:4px 14px;font-size:10px;color:var(--p3);letter-spacing:1px;
  opacity:0;transition:opacity .4s;white-space:nowrap;pointer-events:none;
  font-family:var(--fontb);
}
#alabel.on{opacity:1}

/* ════════════════════════════════════════════════════
   CHAT PANEL
════════════════════════════════════════════════════ */
#chat-panel{
  width:420px;flex-shrink:0;
  display:flex;flex-direction:column;
  background:rgba(13,6,24,0.85);
  backdrop-filter:blur(30px);
  border-left:1px solid var(--glassbrd);
  position:relative;
}

/* header */
#chat-header{
  padding:18px 20px 14px;
  background:linear-gradient(135deg,rgba(168,85,247,.10),rgba(232,121,160,.07));
  border-bottom:1px solid var(--glassbrd);
  display:flex;align-items:center;justify-content:space-between;
  flex-shrink:0;
}
.header-info h1{
  font-size:18px;font-weight:800;
  background:linear-gradient(120deg,var(--p3),var(--p1));
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;
  font-family:var(--fontb);
}
.header-info p{font-size:11px;color:var(--txt3);margin-top:2px}

/* status indicator */
.status-dot{
  display:flex;align-items:center;gap:6px;
  font-size:11px;color:var(--txt3);
}
.status-dot::before{
  content:'';width:7px;height:7px;border-radius:50%;
  background:#4ade80;box-shadow:0 0 6px #4ade80;
  animation:dotpulse 2.5s ease-in-out infinite;
}

#btn-reset{
  background:var(--glass);border:1px solid var(--glassbrd);border-radius:10px;
  color:var(--txt3);font-size:11px;padding:5px 12px;cursor:pointer;
  transition:all .2s;font-family:var(--font);font-weight:600;
}
#btn-reset:hover{border-color:var(--p1);color:var(--p1);background:var(--glasshov)}

/* messages */
#msgs{
  flex:1;overflow-y:auto;
  padding:16px 14px;
  display:flex;flex-direction:column;gap:10px;
  scroll-behavior:smooth;
}
#msgs::-webkit-scrollbar{width:3px}
#msgs::-webkit-scrollbar-track{background:transparent}
#msgs::-webkit-scrollbar-thumb{background:rgba(168,85,247,.25);border-radius:3px}

.msg{
  max-width:84%;display:flex;flex-direction:column;
  animation:msgpop .3s cubic-bezier(.34,1.56,.64,1) both;
}
@keyframes msgpop{
  from{opacity:0;transform:translateY(8px) scale(.97)}
  to{opacity:1;transform:none}
}
.msg.user{align-self:flex-end;align-items:flex-end}
.msg.ai{align-self:flex-start;align-items:flex-start}

.bubble{
  padding:10px 14px;border-radius:18px;
  font-size:13.5px;line-height:1.65;word-break:break-word;
  font-family:var(--fontb);font-weight:500;
}
.msg.user .bubble{
  background:linear-gradient(135deg,var(--p2),var(--p1));
  color:#fff;border-bottom-right-radius:5px;
  box-shadow:0 4px 18px rgba(168,85,247,.35);
}
.msg.ai .bubble{
  background:rgba(255,255,255,.06);
  border:1px solid rgba(240,171,252,.12);
  color:var(--txt);border-bottom-left-radius:5px;
  box-shadow:0 2px 12px rgba(0,0,0,.2);
}
.meta{
  font-size:10px;color:var(--txt3);margin-top:4px;
  padding:0 4px;font-family:var(--font);
}

/* typing indicator */
#typing{
  display:none;align-self:flex-start;
  background:rgba(255,255,255,.06);
  border:1px solid rgba(240,171,252,.12);
  border-radius:18px;border-bottom-left-radius:5px;
  padding:12px 16px;gap:5px;
}
#typing.on{display:flex}
.td{
  width:6px;height:6px;border-radius:50%;
  background:var(--p3);
  animation:tdb 1.1s ease-in-out infinite;
}
.td:nth-child(2){animation-delay:.18s}
.td:nth-child(3){animation-delay:.36s}
@keyframes tdb{0%,80%,100%{transform:scale(.55);opacity:.3}40%{transform:scale(1);opacity:1}}

/* quick buttons */
#qrow{
  display:flex;gap:6px;flex-wrap:wrap;
  padding:10px 14px 0;flex-shrink:0;
}
.qbtn{
  background:var(--glass);border:1px solid var(--glassbrd);
  border-radius:20px;padding:5px 12px;
  font-size:11px;color:var(--txt2);
  cursor:pointer;font-family:var(--fontb);font-weight:600;
  transition:all .2s;white-space:nowrap;
}
.qbtn:hover,.qbtn:active{
  border-color:var(--p1);color:var(--p1);
  background:var(--glasshov);
}

/* input area */
#input-area{
  padding:12px 14px 16px;
  border-top:1px solid var(--glassbrd);
  flex-shrink:0;
  safe-area-inset-bottom:env(safe-area-inset-bottom);
}
#irow{display:flex;gap:8px;align-items:flex-end;margin-top:10px}
#uinput{
  flex:1;
  background:rgba(255,255,255,.06);
  border:1.5px solid var(--glassbrd);
  border-radius:14px;
  padding:10px 14px;
  font-family:var(--fontb);font-size:14px;font-weight:500;
  color:var(--txt);outline:none;resize:none;
  max-height:100px;min-height:44px;line-height:1.5;
  transition:border-color .2s,background .2s;
  -webkit-appearance:none;
}
#uinput:focus{border-color:var(--p2);background:rgba(255,255,255,.09)}
#uinput::placeholder{color:var(--txt3)}
.ibtn{
  width:44px;height:44px;border-radius:13px;border:none;
  display:flex;align-items:center;justify-content:center;
  cursor:pointer;font-size:18px;flex-shrink:0;
  transition:transform .15s,opacity .2s;
  -webkit-tap-highlight-color:transparent;
}
.ibtn:active{transform:scale(.88)}
#btn-send{
  background:linear-gradient(135deg,var(--p2),var(--p1));
  color:#fff;box-shadow:0 4px 16px rgba(168,85,247,.45);
}
#btn-send:disabled{opacity:.3;cursor:not-allowed}
#btn-mic{
  background:var(--glass);border:1.5px solid var(--glassbrd);color:var(--txt2);
}
#btn-mic.rec{
  background:var(--p1);color:#fff;border-color:var(--p1);
  animation:micrec .7s ease-in-out infinite alternate;
}
@keyframes micrec{to{box-shadow:0 0 0 10px rgba(232,121,160,0)}}

/* tts status badge */
#tts-status{
  font-size:10px;color:var(--txt3);text-align:center;
  margin-top:4px;font-family:var(--fontb);min-height:14px;
}

/* ════════════════════════════════════════════════════
   LOADING SCREEN
════════════════════════════════════════════════════ */
#loading{
  position:fixed;inset:0;z-index:300;
  background:var(--bg0);
  display:flex;flex-direction:column;align-items:center;justify-content:center;gap:20px;
  transition:opacity .8s;
}
#loading.hide{opacity:0;pointer-events:none}
.load-rings{position:relative;width:70px;height:70px}
.load-ring{
  position:absolute;inset:0;border-radius:50%;border:2.5px solid transparent;
  animation:spin 1s linear infinite;
}
.load-ring:nth-child(1){border-top-color:var(--p2);animation-duration:.9s}
.load-ring:nth-child(2){border-right-color:var(--p1);animation-duration:1.3s;inset:8px}
.load-ring:nth-child(3){border-bottom-color:var(--p3);animation-duration:1.7s;inset:16px}
@keyframes spin{to{transform:rotate(360deg)}}
#loading p{
  color:var(--p3);font-size:13px;letter-spacing:2px;
  font-family:var(--fontb);font-weight:600;
}

/* ════════════════════════════════════════════════════
   TOAST
════════════════════════════════════════════════════ */
#toast{
  position:fixed;bottom:24px;left:50%;transform:translateX(-50%);
  background:rgba(255,60,100,.9);color:#fff;
  padding:10px 20px;border-radius:12px;font-size:12px;
  z-index:999;opacity:0;transition:opacity .3s;pointer-events:none;
  font-family:var(--fontb);font-weight:600;white-space:nowrap;
}
#toast.on{opacity:1}

/* ════════════════════════════════════════════════════
   MOBILE RESPONSIVE
════════════════════════════════════════════════════ */
@media(max-width:700px){
  #app{flex-direction:column}
  #avatar-panel{height:46vh;flex:none}
  #chat-panel{
    width:100%;flex:1;
    border-left:none;
    border-top:1px solid var(--glassbrd);
  }
  .bubble{font-size:13px}
  #chat-header{padding:12px 14px 10px}
  .header-info h1{font-size:16px}
  #qrow{padding:8px 10px 0}
  .qbtn{font-size:10px;padding:4px 10px}
  #input-area{padding:8px 10px 12px}
  #irow{margin-top:8px}
  #uinput{min-height:40px;font-size:13px}
  .ibtn{width:40px;height:40px}
  #msgs{padding:12px 10px}
}

@media(max-width:380px){
  #qrow{gap:4px}
  .qbtn{font-size:9.5px;padding:3px 8px}
}
</style>
</head>

<script type="module">
import * as THREE from 'three';
import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';
import { VRMLoaderPlugin, VRMUtils } from '@pixiv/three-vrm';

/* ══════════════════════════════════════════════════════
   KEYS & ENDPOINTS
══════════════════════════════════════════════════════ */
// NVIDIA NIM — OpenAI-compatible endpoint
/* ElevenLabs — called directly (has CORS enabled) */
const EL_KEY   = 'sk_250212ffaad2004dbf6f427367e450fea3be5d2dedc8d3d1';
const EL_VOICE = '1zUSi8LeHs9M2mV8X6YS';
const EL_URL   = `https://api.elevenlabs.io/v1/text-to-speech/${EL_VOICE}/stream`;

let history = [];

/* ══════════════════════════════════════════════════════
   AI CHAT — calls /api/chat (Cloudflare Function)
   The function proxies to NVIDIA NIM server-side,
   bypassing the CORS block that breaks browser fetch.
══════════════════════════════════════════════════════ */
async function callAI(msg){
  history.push({role:'user', content:msg});

  let res;
  try{
    res = await fetch('/api/chat', {
      method:  'POST',
      headers: {'Content-Type':'application/json'},
      body:    JSON.stringify({
        message: msg,
        history: history.slice(-40),
      }),
    });
  }catch(netErr){
    history.pop(); // remove failed message
    throw new Error('Cannot reach /api/chat: '+netErr.message);
  }

  if(!res.ok){
    const errText = await res.text().catch(()=>'(no body)');
    history.pop();
    throw new Error(`API error ${res.status}: ${errText.slice(0,200)}`);
  }

  const d     = await res.json();
  if(d.error){ history.pop(); throw new Error(d.error); }

  const reply = d.reply ?? '';
  const emo   = d.emo   ?? 'happy';

  history.push({role:'assistant', content:reply});
  return {reply, emo};
}

/* ══════════════════════════════════════════════════════
   ELEVENLABS TTS
   Fix: use Blob URL + <audio> element instead of
   WebAudio decodeAudioData — works on all browsers
   including mobile Safari which rejects mp3 decode.
══════════════════════════════════════════════════════ */
let currentAudio = null;

function stopAudio(){
  if(currentAudio){
    currentAudio.pause();
    currentAudio.src = '';
    try{ URL.revokeObjectURL(currentAudio._blobUrl); }catch(_){}
    currentAudio = null;
  }
}

function cleanForTTS(text){
  return text
    .replace(/[\u{1F000}-\u{1FFFF}]/gu,'')
    .replace(/[\u2600-\u27BF]/g,'')
    .replace(/[*_~`>#\[\]]/g,'')
    .replace(/[^\w\s',.!?;:\-]/g,' ')
    .replace(/\s+/g,' ').trim();
}

async function speakEL(text, onStart, onEnd){
  const clean = cleanForTTS(text);
  if(!clean){ onEnd?.(); return; }

  setTTSStatus('🎙️ Generating voice…');
  try{
    const res = await fetch(EL_URL, {
      method: 'POST',
      headers: {
        'Content-Type':  'application/json',
        'xi-api-key':    EL_KEY,
        'Accept':        'audio/mpeg',
      },
      body: JSON.stringify({
        text:     clean,
        model_id: 'eleven_turbo_v2_5',   // latest + fastest model
        output_format: 'mp3_44100_128',
        voice_settings: {
          stability:        0.42,
          similarity_boost: 0.80,
          style:            0.30,
          use_speaker_boost: true,
        },
      }),
    });

    if(!res.ok){
      const errBody = await res.text();
      console.error('ElevenLabs response:', res.status, errBody);
      throw new Error(`ElevenLabs ${res.status}`);
    }

    // Get audio as blob and create object URL — works everywhere
    const blob    = await res.blob();
    const blobUrl = URL.createObjectURL(blob);

    stopAudio();

    const audio      = new Audio(blobUrl);
    audio._blobUrl   = blobUrl;
    currentAudio     = audio;

    setTTSStatus('🌸 Speaking…');
    onStart?.();

    audio.onended = ()=>{
      URL.revokeObjectURL(blobUrl);
      currentAudio = null;
      setTTSStatus('');
      onEnd?.();
    };
    audio.onerror = (e)=>{
      console.error('Audio play error:', e);
      URL.revokeObjectURL(blobUrl);
      currentAudio = null;
      setTTSStatus('⚠️ Playback error — using fallback');
      fallbackTTS(clean, onStart, onEnd);
    };

    // play() returns a promise — must catch rejection (autoplay policy)
    audio.play().catch(e=>{
      console.warn('Autoplay blocked:', e);
      setTTSStatus('⚠️ Tap screen to enable voice');
      // Try again on next user gesture
      const resume = ()=>{
        audio.play().catch(()=>{});
        document.removeEventListener('click', resume);
        document.removeEventListener('touchstart', resume);
      };
      document.addEventListener('click', resume, {once:true});
      document.addEventListener('touchstart', resume, {once:true});
    });

  }catch(e){
    console.error('ElevenLabs error:', e);
    setTTSStatus('⚠️ Using browser voice');
    fallbackTTS(clean, onStart, onEnd);
  }
}

function fallbackTTS(text, onStart, onEnd){
  if(!('speechSynthesis' in window)){ onEnd?.(); return; }
  window.speechSynthesis.cancel();
  const utt = new SpeechSynthesisUtterance(text);
  const vs  = window.speechSynthesis.getVoices();
  const v   = vs.find(x=>/google uk english female|samantha|karen|zira/i.test(x.name))
           || vs.find(x=>/female/i.test(x.name))
           || vs.find(x=>/en/i.test(x.lang));
  if(v) utt.voice = v;
  utt.pitch = 1.35; utt.rate = 1.05; utt.volume = 1;
  utt.onstart  = ()=> onStart?.();
  utt.onend    = ()=> onEnd?.();
  utt.onerror  = ()=> onEnd?.();
  setTimeout(()=> window.speechSynthesis.speak(utt), 80);
}

function setTTSStatus(msg){ document.getElementById('tts-status').textContent=msg; }

/* ══════════════════════════════════════════════════════
   CORE HELPERS
══════════════════════════════════════════════════════ */
const lerp=(a,b,t)=>a+(b-a)*t;
const clamp=(v,lo,hi)=>Math.max(lo,Math.min(hi,v));
const S=Math.sin, C=Math.cos, A=Math.abs, PI=Math.PI;
const boneNode=n=>vrm?.humanoid?.getNormalizedBoneNode(n)??null;
const setExpr=(n,v)=>{ if(!vrm)return; try{vrm.expressionManager?.setValue(n,clamp(v,0,1));}catch(_){} };

/* ══════════════════════════════════════════════════════
   POSE SYSTEM — smooth lerp TARGET→LIVE every frame
══════════════════════════════════════════════════════ */
const PTGT={}, PLIV={};
function applyPose(map){
  for(const[k,v] of Object.entries(map)) PTGT[k]=[v[0],v[1],v[2]];
}
function tickBones(dt){
  const sp=clamp(dt*9,0,1);
  for(const[n,t] of Object.entries(PTGT)){
    if(!PLIV[n]) PLIV[n]=[t[0],t[1],t[2]];
    PLIV[n][0]=lerp(PLIV[n][0],t[0],sp);
    PLIV[n][1]=lerp(PLIV[n][1],t[1],sp);
    PLIV[n][2]=lerp(PLIV[n][2],t[2],sp);
  }
  for(const[n,r] of Object.entries(PLIV)){
    const b=boneNode(n); if(!b)continue;
    b.rotation.x=r[0]; b.rotation.y=r[1]; b.rotation.z=r[2];
  }
}

/* ══════════════════════════════════════════════════════
   ARM ROTATION HELPER
   VRM1 leftUpperArm:  z=0 → T-pose,  z=-PI/2 → arm DOWN
   VRM1 rightUpperArm: z=0 → T-pose,  z=+PI/2 → arm DOWN
   raise: 0=fully down, 1=fully up (PI/2 radians)
   swing: outward swing amount
   fwd:   forward tilt (natural hang)
══════════════════════════════════════════════════════ */
function arm(side,raise=0,swing=0,fwd=0.06){
  const h=PI/2; // 90° = straight down
  if(side==='L') return [fwd+raise*0.25, swing*0.3, -(h-raise)];
  else           return [fwd+raise*0.25,-swing*0.3,  (h-raise)];
}
// Bent forearm helper — natural resting bend
function fore(side,bend=0.10,twist=0){
  if(side==='L') return [bend,0, twist+0.04];
  else           return [bend,0,-twist-0.04];
}

/* ══════════════════════════════════════════════════════
   FINGER SHAPES (all 20 fingers, 3 joints each)
══════════════════════════════════════════════════════ */
function fingers(side,shape){
  const s=side==='L'?'left':'right', sg=side==='L'?1:-1, p={};
  const JNTS=['Proximal','Intermediate','Distal'];

  // Thumb presets [metacarpal, proximal, distal]
  const TH={
    rest: [[0,0,sg*-0.22],[0,0,sg*-0.08],[0.05,0,0]],
    open: [[0,0,sg*-0.30],[0,0,sg*-0.10],[0.04,0,0]],
    curl: [[0.16,0,sg*0.22],[0.24,0,sg*0.14],[0.16,0,0]],
    wave: [[0,0,sg*-0.32],[0,0,sg*-0.10],[0.04,0,0]],
    think:[[0,0,sg*-0.18],[0.07,0,sg*-0.06],[0.05,0,0]],
    pinch:[[0.18,0,sg*-0.08],[0.35,0,sg*0.08],[0.28,0,0]],
  };
  const thKey = {rest:'rest',open:'open',loose:'rest',fist:'curl',point:'curl',peace:'curl',wave:'wave',think:'think',ok:'pinch',spread:'open',relax:'rest'}[shape]||'rest';
  const th=TH[thKey];
  p[`${s}ThumbMetacarpal`]=th[0]; p[`${s}ThumbProximal`]=th[1]; p[`${s}ThumbDistal`]=th[2];

  const spread={Index:sg*-0.06,Middle:sg*-0.02,Ring:sg*0.02,Little:sg*0.06};

  ['Index','Middle','Ring','Little'].forEach(f=>{
    let c;
    const sp=spread[f];
    if(shape==='open'||shape==='spread')c=[0.04,0.05,0.04];
    else if(shape==='rest'||shape==='relax')c=[0.12,0.16,0.10];
    else if(shape==='loose')c=[0.15,0.20,0.12];
    else if(shape==='fist')c=[1.32,1.32,1.32];
    else if(shape==='point')c=f==='Index'?[0.03,0.03,0.03]:[1.32,1.32,1.32];
    else if(shape==='peace')c=(f==='Index'||f==='Middle')?[0.03,0.03,0.03]:[1.32,1.32,1.32];
    else if(shape==='wave')c=[0.08,0.10,0.07];
    else if(shape==='think')c=f==='Index'?[0.22,0.22,0.14]:[0.70,0.70,0.70];
    else if(shape==='ok')c=f==='Index'?[1.05,1.05,1.05]:[0.09,0.11,0.07];
    else c=[0.12,0.16,0.10]; // default rest
    JNTS.forEach((j,i)=>{ p[`${s}${f}${j}`]=[c[i],0,i===0?sp:0]; });
  });
  return p;
}

/* ══════════════════════════════════════════════════════
   MAIN ANIMATION LOOP
══════════════════════════════════════════════════════ */
const clock=new THREE.Clock();

function bootLoop(){
  const tick=()=>{
    requestAnimationFrame(tick);
    const dt=Math.min(clock.getDelta(),0.05);
    const now=clock.elapsedTime;

    if(!vrm){ renderer.render(scene,camera); return; }

    /* ── Idle base ── */
    idleTime+=dt; swapIn-=dt;
    if(swapIn<=0&&!curGest){
      curIdle=IDLES[Math.floor(Math.random()*IDLES.length)];
      idleTime=0; swapIn=7+Math.random()*10;
      showLabel(curIdle.name);
    }
    const idlePose=curIdle.fn(now);
    // Extract body Y if provided
    const pBodyY=idlePose.vrm_bodyY??0;
    delete idlePose.vrm_bodyY;
    applyPose(idlePose);

    /* ── Choreo system (overrides normal gestures when active) ── */
    if(choreoActive){
      tickChoreo(dt);
    } else {

    /* ── Spontaneous random gestures ── */
    if(!curGest && !isTalking && Math.random()<dt*0.038){
      const pool=[4,5,14,15,16,17,18,9,21,22,27,
                  38,39,40,44,47,49,50,51,52,53,54,55,56,57,59,60];
      playGest(pool[Math.floor(Math.random()*pool.length)]);
    }

    /* ── Gesture overlay ── */
    if(curGest){
      gestTime+=dt;
      const t=clamp(gestTime/curGest.dur,0,1);
      const gp=curGest.fn(t);
      const gBodyY=gp.vrm_bodyY??0; delete gp.vrm_bodyY;
      applyPose(gp);
      bodyY=lerp(bodyY, pBodyY+gBodyY, dt*8);
      if(t>=1){ curGest=null; if(vrm) vrm.scene.rotation.y=0; }
    } else {
      bodyY=lerp(bodyY, pBodyY, dt*8);
    }

    /* ── Speaking gestures ── */
    if(isTalking){
      nextTalkGest-=dt;
      if(nextTalkGest<=0){
        const pool=[30,31,32,33,34,35,36,37,4,16,17];
        playGest(pool[Math.floor(Math.random()*pool.length)]);
        nextTalkGest=1.8+Math.random()*2.5;
      }
    }

    } /* end !choreoActive */

    tickBones(dt);

    /* ── Body Y bob ── */
    vrm.scene.position.y=lerp(vrm.scene.position.y??0, bodyY, dt*8);

    /* ── Mouth ── */
    const mTgt=isTalking?clamp(0.25+S(now*14)*.22+S(now*23)*.09,0,1):0;
    mouthV=lerp(mouthV,mTgt,dt*20);
    setExpr('aa',mouthV);
    setExpr('oh',mouthV*.28);
    setExpr('ih',mouthV*.14);

    /* ── Blink ── */
    blinkT-=dt;
    if(blinkT<=0&&!isBlinking){isBlinking=true;blinkPh=0;}
    if(isBlinking){
      blinkPh+=dt*9;
      const bv=blinkPh<PI?S(blinkPh):0;
      setExpr('blink',bv); setExpr('blinkLeft',bv); setExpr('blinkRight',bv);
      if(blinkPh>=PI){isBlinking=false;blinkT=2.5+Math.random()*3.5;}
    }

    /* ── Expressions lerp ── */
    ALL_EX.forEach(k=>{
      exC[k]=lerp(exC[k]??0,exT[k]??0,dt*3.5);
      setExpr(k,exC[k]);
    });

    /* ── Subtle eye movement ── */
    const eyeX=S(now*.63)*.010, eyeY=S(now*.42)*.007;
    const le=boneNode('leftEye'), re=boneNode('rightEye');
    if(le){le.rotation.x=eyeX;le.rotation.y=eyeY;}
    if(re){re.rotation.x=eyeX;re.rotation.y=eyeY;}

    vrm.update(dt);
    renderer.render(scene,camera);
  };
  tick();
}

/* ══════════════════════════════════════════════════════
   ██████████████████████████████████████████████████
   COMMAND SYSTEM
   Detects keywords in user messages and plays
   special choreographed animation sequences.
   Each command has multiple variants — picked
   randomly so it never looks the same twice.
   ██████████████████████████████████████████████████
══════════════════════════════════════════════════════ */

/* ── Choreography engine ──
   A "choreo" is an array of steps:
   { fn, dur, expr?, emo? }
   Steps play back-to-back automatically.
   While a choreo is running, normal idle/gesture
   scheduling is paused.
*/
let choreoQueue   = [];   // array of steps remaining
let choreoActive  = false;
let choreoStepT   = 0;    // elapsed time in current step
let choreoStep    = null; // current step

function runChoreo(steps){
  // stop any current gesture/choreo cleanly
  if(vrm) vrm.scene.rotation.y = 0;
  curGest      = null;
  choreoQueue  = [...steps];
  choreoActive = true;
  choreoStep   = null;
  choreoStepT  = 0;
  swapIn       = 999; // pause idle swapping
  _nextChoreoStep();
}

function _nextChoreoStep(){
  if(choreoQueue.length === 0){
    choreoActive = false;
    choreoStep   = null;
    swapIn       = 2; // resume idle soon
    if(vrm) vrm.scene.rotation.y = 0;
    return;
  }
  choreoStep  = choreoQueue.shift();
  choreoStepT = 0;
  if(choreoStep.emo)   applyEmo(choreoStep.emo);
  if(choreoStep.expr)  exT = {...choreoStep.expr};
  if(choreoStep.label) showLabel(choreoStep.label);
}

// Hook into the main loop — call this every frame
function tickChoreo(dt){
  if(!choreoActive || !choreoStep) return;
  choreoStepT += dt;
  const t = clamp(choreoStepT / choreoStep.dur, 0, 1);
  const p = choreoStep.fn(t);
  const by = p.vrm_bodyY ?? 0; delete p.vrm_bodyY;
  applyPose(p);
  bodyY = lerp(bodyY, by, dt*8);
  if(t >= 1) _nextChoreoStep();
}

  buildDance_spin,
  buildDance_shuffle,
  buildDance_cute,
  buildDance_hiphop,
];
let lastDanceIdx = -1;

function getNextDance(){
  // never repeat same dance twice in a row
  let idx;
  do { idx = Math.floor(Math.random()*DANCE_VARIANTS.length); }
  while(idx === lastDanceIdx && DANCE_VARIANTS.length > 1);
  lastDanceIdx = idx;
  return DANCE_VARIANTS[idx]();
}

function getRandom(arr){ return arr[Math.floor(Math.random()*arr.length)]; }

const COMMAND_MAP = [
  { keywords:['dance','dancing','boogie','groove','moves','twerk','perform'],
    build: ()=>getNextDance(),
    type:'dance' },
  { keywords:['spin','twirl','rotate','pirouette','turn around','spinning'],
    build: buildSeq_spin, type:'spin' },
  { keywords:['wave','hi','hello','greet','bye','goodbye','see ya','ciao'],
    build: buildSeq_wave, type:'wave' },
  { keywords:['jump','hop','leap','bounce','jumping'],
    build: buildSeq_jump, type:'jump' },
  { keywords:['clap','clapping','applaud','bravo','woohoo'],
    build: buildSeq_clap, type:'clap' },
  { keywords:['bow','curtsy','curtsey','namaste','respect'],
    build: buildSeq_bow, type:'bow' },
  { keywords:['stretch','yawn','wake up','loosen'],
    build: buildSeq_stretch, type:'stretch' },
  { keywords:['happy','celebrate','yay','yatta','wohoo','woohoo','hurray','hooray','excited'],
    build: buildSeq_happy, type:'happy' },
];

function detectCommand(text){
  const lower = text.toLowerCase();
  for(const cmd of COMMAND_MAP){
    if(cmd.keywords.some(kw => lower.includes(kw))){
      return cmd;
    }
  }
  return null;
}

async function sendMsg(text){
  text=text.trim(); if(!text)return;
  inputEl.value=''; inputEl.style.height='';
  addMsg('user',text);

  /* ── Check for animation command first ── */
  const cmd = detectCommand(text);
  if(cmd){
    setTyping(false);
    const response = getRandom(CMD_RESPONSES[cmd.type]);
    addMsg('ai', response);
    applyEmo('excited');
    // Play choreo
    runChoreo(cmd.build());
    // Speak response
    await speakEL(
      response,
      ()=>{ isTalking=true; nextTalkGest=0; document.getElementById('wave').classList.add('on'); },
      ()=>{ isTalking=false; document.getElementById('wave').classList.remove('on'); setTTSStatus(''); }
    );
    return;
  }

  /* ── Normal AI chat ── */
  setTyping(true);
  applyEmo('listening');
  emoGest('listening');

  try{
    const {reply,emo}=await callAI(text);
    setTyping(false);
    addMsg('ai',reply);
    applyEmo(emo);
    emoGest(emo);

    await speakEL(
      reply,
      ()=>{ isTalking=true; nextTalkGest=0; document.getElementById('wave').classList.add('on'); },
      ()=>{ isTalking=false; document.getElementById('wave').classList.remove('on'); applyEmo('listening'); setTTSStatus(''); }
    );
  }catch(e){
    setTyping(false);
    console.error('Error:',e);
    showToast('⚠️ '+e.message.slice(0,80));
    addMsg('ai','A-ano… I got an error: '+e.message.slice(0,120));
  }
}

sendBtn.addEventListener('click',()=>sendMsg(inputEl.value));
inputEl.addEventListener('keydown',e=>{
  if(e.key==='Enter'&&!e.shiftKey){e.preventDefault();sendMsg(inputEl.value);}
});
inputEl.addEventListener('input',()=>{
  inputEl.style.height='';
  inputEl.style.height=Math.min(inputEl.scrollHeight,100)+'px';
});
document.getElementById('btn-reset').addEventListener('click',()=>{
  history=[];
  stopAudio(); isTalking=false;
  document.getElementById('wave').classList.remove('on');
  setTTSStatus('');
  while(msgsEl.firstChild!==typingEl) msgsEl.removeChild(msgsEl.firstChild);
  addMsg('ai','Hai~ fresh start! What shall we talk about? ✿');
  applyEmo('greeting'); emoGest('greeting');
});
document.querySelectorAll('.qbtn').forEach(b=>b.addEventListener('click',()=>sendMsg(b.dataset.msg)));

/* ── Voice input ── */
let recog=null;
if('SpeechRecognition' in window||'webkitSpeechRecognition' in window){
  const SR=window.SpeechRecognition||window.webkitSpeechRecognition;
  recog=new SR(); recog.lang='en-US'; recog.interimResults=false;
  recog.onresult=e=>{ const t=e.results[0][0].transcript; inputEl.value=t; sendMsg(t); };
  recog.onend=recog.onerror=()=>micBtn.classList.remove('rec');
}
micBtn.addEventListener('click',()=>{
  if(!recog){addMsg('ai','Speech recognition not supported here~');return;}
  if(micBtn.classList.contains('rec')){recog.stop();}
  else{
    // Stop any playing audio first
    stopAudio(); isTalking=false;
    document.getElementById('wave').classList.remove('on');
    micBtn.classList.add('rec');
    recog.start();
  }
});
